<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payoo | HOME </title>
    <link rel="shortcut icon" href="assets/logo.png" type="images/x-icon">

    <!--tailwind+daisy-->

<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="min-h-screen max-w-md bg-base-200 mx-auto">

<header class="border-b-2 border-gray-300 sticky top-0 bg-base-200 z-10">
    <section class="w-11/12 mx-auto py-3 flex justify-between items-center">
        <div class="left flex gap-1">
            <div class="logo w-[60px]">
                <img src="assets/logo.png" alt="">
            </div>

            <div class="balance-info">
                <h2 class="text-2xl font-bold"> $ <span id="balance">45000 </span> </h2>
                <p class="text-neutral/50">Available Balance</p>
            </div>

        </div>
        <div class="right">
            <a href="/index.html" class="btn btn-soft "><i class="fa-solid fa-right-from-bracket"></i>Logout </a></button>
        </div>

    </section>
</header>
    
<section class="w-11/12 mx-auto py-10 space-y-5">
    <h2 class="text-3xl font-bold">Welcome to Pay<span class="text-primary">oo</span> </h2>
          <p class="text-neutral/50">Enjoy easy and convenient financial services with us. Cashout charge is low and </p>

          <div class="buttons grid grid-cols-3 gap-3">

            <button onclick="showOnly('add-money')" class="btn flex-col h-full py-4 btn-primary btn-soft">
                <img src="assets/opt-1.png" alt="">
                <p>Add Money</p>
            </button>
            <button onclick="showOnly('cashout')" class="btn flex-col h-full py-4 btn-primary btn-soft">
                <img src="assets/opt-2.png" alt="">
                <p>Cashout</p>
            </button>
            <button onclick="showOnly('transfer-money')" class="btn flex-col h-full py-4 btn-primary btn-soft">
    <img src="assets/opt-3.png" alt="">
    <p>Transfer Money</p>
</button>

<button onclick="showOnly('get-bonus')" class="btn flex-col h-full py-4 btn-primary btn-soft">
    <img src="assets/opt-4.png" alt="">
    <p>Get Bonus</p>
</button>

<button onclick="showOnly('pay-bill')" class="btn flex-col h-full py-4 btn-primary btn-soft">
    <img src="assets/opt-5.png" alt="">
    <p>Pay Bill</p>
</button>
            <button onclick="showOnly('history')" class="btn flex-col h-full py-4 btn-primary btn-soft">
                <img src="assets/opt-6.png" alt="">
                <p>Transaction</p>
            </button>

          </div>
</section>
<!-- ADD Money Section -->
<section id="add-money" class="w-11/12 mx-auto py-5 hidden">
<h2 class="text-xl font-bold mb-5">Add Money</h2>
<div class="card bg-base-100 w-full shadow  rounded-2xl">
      <div class="card-body">
        <fieldset class="fieldset">

 <label class="label text-neutral font-bold">Select a bank</label>

    <select id="add-money-bank" class="select w-full bg-base-200 rounded-full">
 <option disabled selected value="">Select a bank</option>
  <option value="DBBL">DBBL</option>
  <option value="Prime">Prime</option>
  <option value="Sonali">Sonali</option>
  <option value="Brac">Brac</option>
    </select> 
<br>
          <label class="label text-neutral font-bold">Bank Account Number</label>
          <input id="add-money-number"  maxlength="11" minlength="11"  type="text" class="input rounded-full bg-base-200 w-full "
           value="01234567890"
           placeholder=" Enter bank 11 digit Number" />
          <br>

          <label class="label text-neutral font-bold">Amount to add</label>
          <input id="add-money-amount" type="number" type="text" class="input rounded-full bg-base-200 w-full" 
          placeholder=" Enter amount to add" />
          <br>

          <label class="label text-neutral font-bold">Pin Number</label>
          <input id="add-money-pin"  maxlength="4" minlength="4"  type="password" class="input rounded-full bg-base-200 w-full" 
          placeholder=" Enter 4 digit pin" />

        
          <button id="add-money-btn" class="btn btn-primary rounded-full mt-4">Add Money</button>
        </fieldset>
      </div>
    </div>
</section>
<!-- Cashout Section -->
<section id="cashout" class="w-11/12 mx-auto py-5">
<h2 class="text-xl font-bold mb-5">Cashout</h2>
   <div class="card bg-base-100 w-full shadow  rounded-2xl">
      <div class="card-body">
        <fieldset class="fieldset">
          <label class="label text-neutral font-bold">Agent Number</label>
          <input id="cashout-number"  maxlength="11" minlength="11"  type="text" class="input rounded-full bg-base-200 w-full "
           value="01234567890"
           placeholder=" Enter Agent 11 digit Number" />
          <br>

          <label class="label text-neutral font-bold">Amount</label>
          <input id="cashout-amount" type="number" type="text" class="input rounded-full bg-base-200 w-full" 
          placeholder=" Enter amount for withdraw" />
          <br>

          <label class="label text-neutral font-bold">4 digit pin</label>
          <input id="cashout-pin"  maxlength="4" minlength="4"  type="password" class="input rounded-full bg-base-200 w-full" 
          placeholder=" Enter 4 digit pin" />

        
          <button id="cashout-btn" class="btn btn-primary rounded-full mt-4">Withdraw Money</button>
        </fieldset>
      </div>
    </div>
</section>

<!-- Transfer Money Section -->
<section id="transfer-money" class="w-11/12 mx-auto py-5 hidden">
  <h2 class="text-xl font-bold mb-5">Transfer Money</h2>
  <div class="card bg-base-100 w-full shadow rounded-2xl">
    <div class="card-body">
      <fieldset class="fieldset">
        <label class="label text-neutral font-bold">User Account Number</label>
        <input id="transfer-number" maxlength="11" minlength="11" type="text"
          class="input rounded-full bg-base-200 w-full"
          placeholder="Enter user 11 digit number" />
        <br>

        <label class="label text-neutral font-bold">Amount</label>
        <input id="transfer-amount" type="number"
          class="input rounded-full bg-base-200 w-full"
          placeholder="Enter amount to transfer" />
        <br>

        <label class="label text-neutral font-bold">4 digit pin</label>
        <input id="transfer-pin" maxlength="4" minlength="4" type="password"
          class="input rounded-full bg-base-200 w-full"
          placeholder="Enter 4 digit pin" />

        <button id="transfer-btn" class="btn btn-primary rounded-full mt-4">Send Now</button>
      </fieldset>
    </div>
  </div>
</section>

<!-- Get Bonus Section -->
<section id="get-bonus" class="w-11/12 mx-auto py-5 hidden">
  <h2 class="text-xl font-bold mb-5">Get Bonus</h2>
  <div class="card bg-base-100 w-full shadow rounded-2xl">
    <div class="card-body">
      <fieldset class="fieldset">
        <label class="label text-neutral font-bold">Enter Bonus Coupon</label>
        <input id="bonus-coupon" type="text"
          class="input rounded-full bg-base-200 w-full"
          placeholder="Enter coupon code" />

        <button id="bonus-btn" class="btn btn-primary rounded-full mt-4">Get Bonus</button>
      </fieldset>
    </div>
  </div>
</section>

<!-- Pay Bill Section -->
<section id="pay-bill" class="w-11/12 mx-auto py-5 hidden">
  <h2 class="text-xl font-bold mb-5">Pay Bill</h2>
  <div class="card bg-base-100 w-full shadow rounded-2xl">
    <div class="card-body">
      <fieldset class="fieldset">

        <label class="label text-neutral font-bold">Select Bill Type</label>
        <select id="bill-type" class="select w-full bg-base-200 rounded-full">
          <option disabled selected value="">Select bill type</option>
          <option value="Electricity">Electricity</option>
          <option value="Water">Water</option>
          <option value="Gas">Gas</option>
          <option value="Internet">Internet</option>
        </select>
        <br>

        <label class="label text-neutral font-bold">Biller Account Number</label>
        <input id="bill-number" maxlength="11" minlength="11" type="text"
          class="input rounded-full bg-base-200 w-full"
          placeholder="Enter bill account number" />
        <br>

        <label class="label text-neutral font-bold">Amount</label>
        <input id="bill-amount" type="number"
          class="input rounded-full bg-base-200 w-full"
          placeholder="Enter bill amount" />
        <br>

        <label class="label text-neutral font-bold">4 digit pin</label>
        <input id="bill-pin" maxlength="4" minlength="4" type="password"
          class="input rounded-full bg-base-200 w-full"
          placeholder="Enter 4 digit pin" />

        <button id="bill-btn" class="btn btn-primary rounded-full mt-4">Pay Now</button>
      </fieldset>
    </div>
  </div>
</section>


<section id="history"class="w-11/12 mx-auto py-5 space-y-5 hidden">
<h2 class="text-xl font-bold mb-5">Transactions</h2>
<div class="space-y-5" id="history-container">
   
</div>

</section>

<script src="scripts/machine.js"></script>
<script src="scripts/addMoney.js"></script>
<script src="scripts/cashout.js"></script>

</body>
</html>
